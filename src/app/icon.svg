<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
    <linearGradient id="center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <g opacity="0.1">
    <circle cx="16" cy="16" r="12" fill="none" stroke="#00d4ff" stroke-width="0.5"/>
    <circle cx="16" cy="16" r="8" fill="none" stroke="#a855f7" stroke-width="0.5"/>
  </g>
  <g stroke="url(#line)" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)">
    <line x1="16" y1="16" x2="16" y2="5"/>
    <line x1="16" y1="16" x2="26" y2="10"/>
    <line x1="16" y1="16" x2="26" y2="22"/>
    <line x1="16" y1="16" x2="16" y2="27"/>
    <line x1="16" y1="16" x2="6" y2="22"/>
    <line x1="16" y1="16" x2="6" y2="10"/>
  </g>
  <polygon points="16,5 26,10 26,22 16,27 6,22 6,10" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <circle cx="16" cy="5" r="2" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="26" cy="10" r="1.8" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="26" cy="22" r="1.8" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="16" cy="27" r="2" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="6" cy="22" r="1.8" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="6" cy="10" r="1.8" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="5" fill="url(#center)" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="4" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <text x="16" y="19" font-family="Arial" font-size="6.5" font-weight="bold" fill="#0a0a1a" text-anchor="middle">S</text>
